<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscripción a Cursos - UACM</title>
    
    <!-- ENLACE AL CSS SECUNDARIO DEL FORMULARIO -->
    <link rel="stylesheet" href="contacto.css">
    
    <!-- Google Fonts (Poppins Real) -->
    <link href="https://googleapis.com" rel="stylesheet">
    
    <!-- Font Awesome (Para los iconos del botón y campos) -->
    <link rel="stylesheet" href="https://cloudflare.com">
</head>
<body>

    <!-- BOTÓN DE REGRESO PREMIUM -->
    <a href="index.html" class="btn-regreso">
        <i class="fa-solid fa-arrow-left"></i> Volver al Inicio
    </a>

    <!-- SECCIÓN PRINCIPAL CON ANIMACIÓN -->
    <section id="contacto">
        
        <div class="contenedor-formulario">
            <h2>Inscripción a Cursos</h2>
            <p class="subtitulo-form">Crece profesionalmente y conoce el mundo hablando bien inglés</p>

            <form>
                <!-- Fila 1: Nombre y Matrícula -->
                <div class="fila-formulario">
                    <div class="grupo-formulario">
                        <label><i class="fa-solid fa-user"></i> Nombre</label>
                        <input type="text" placeholder="Ingresa tu nombre" required>
                    </div>
                    <div class="grupo-formulario">
                        <label><i class="fa-solid fa-id-card"></i> Apelido</label>
                        <input type="text" placeholder="Ingresa tu apellido" required>
                    </div>
                </div>

                <!-- Fila 2: Carrera y Plantel -->
                <div class="fila-formulario">
                    <div class="grupo-formulario">
                        <label><i class="fa-solid fa-graduation-cap"></i> Edad</label>
                        <input type="text" placeholder="Ingresa tu edad" required>
                    </div>
                    <div class="grupo-formulario">
                        <label><i class="fa-solid fa-school"></i> Ciudad o Estado en donde te ubicas</label>
                        <select required class="select-premium">
                            <option value="" disabled selected>Ciudad o Estado en donde te ubicas</option>
                            <option value="cdmx">Ciudad de México</option>
                            <option value="estado-de-mexico">Estado de México</option>
                            <option value="aguascalientes">Aguascalientes</option>
                            <option value="baja-california">Baja California</option>
                            <option value="baja-california-sur">Baja California Sur</option>
                            <option value="campeche">Campeche</option>
                            <option value="chiapas">Chiapas</option>
                            <option value="chihuahua">Chihuahua</option>
                            <option value="coahuila">Coahuila</option>
                            <option value="colima">Colima</option>
                            <option value="durango">Durango</option>
                            <option value="guanajuato">Guanajuato</option>
                            <option value="guerrero">Guerrero</option>
                            <option value="hidalgo">Hidalgo</option>
                            <option value="jalisco">Jalisco</option>
                            <option value="michoacan">Michoacán</option>
                            <option value="morelos">Morelos</option>
                            <option value="nayarit">Nayarit</option>
                            <option value="nuevo-leon">Nuevo León</option>
                            <option value="oaxaca">Oaxaca</option>
                            <option value="puebla">Puebla</option>
                            <option value="queretaro">Querétaro</option>
                            <option value="quintana-roo">Quintana Roo</option>
                            <option value="san-luis-potosi">San Luis Potosí</option>
                            <option value="sinaloa">Sinaloa</option>
                            <option value="sonora">Sonora</option>
                            <option value="tabasco">Tabasco</option>
                            <option value="tamaulipas">Tamaulipas</option>
                            <option value="tlaxcala">Tlaxcala</option>
                            <option value="veracruz">Veracruz</option>
                            <option value="yucatan">Yucatán</option>
                            <option value="zacatecas">Zacatecas</option>
                        </select>
                    </div>
                </div>

                <!-- Fila 3: Celular y Correo -->
                <div class="fila-formulario">
                    <div class="grupo-formulario">
                        <label><i class="fa-solid fa-phone"></i> Número de teléfono</label>
                        <input type="tel" placeholder="Ej: 55 1135 4990" required>
                    </div>
                    <div class="grupo-formulario">
                        <label><i class="fa-solid fa-envelope"></i> Correo Electrónico</label>
                        <input type="email" placeholder="Ej: jose.sanchez.@alumnos.uacm.edu.mx" required>
                    </div>
                </div>

                <!-- Fila 4: Radio Buttons Opciones de Cursos -->
                <div class="grupo-opciones">
                    <label class="titulo-opciones"><i class="fa-solid fa-brain"></i> ¿Cuál de los siguientes cursos te interesa?</label>
                    
                    <div class="rejilla-opciones">
                        <label class="opcion-radio">
                            <input type="radio" name="curso" value="prompts" required>
                            <span>Inglés desde cero (Pre-A1)</span>
                        </label>
                        
                        <label class="opcion-radio">
                            <input type="radio" name="curso" value="python">
                            <span> Usuario Básico (Nivel A1,A2)</span>
                        </label>
                        
                        <label class="opcion-radio">
                            <input type="radio" name="curso" value="machine">
                            <span>Usuario Independiente (Nivel B1,B2) </span>
                        </label>
                        
                        <label class="opcion-radio">
                            <input type="radio" name="curso" value="redes">
                            <span>Usuario Competente (Nivel C1,C2)</span>
                        </label>
                    </div>
                </div>

                <!-- Fila 5: Dudas o Comentarios -->
                <div class="grupo-formulario completo">
                    <label><i class="fa-solid fa-comments"></i> Dudas o Comentarios adicionales</label>
                    <textarea placeholder="Escribe aquí tus dudas o comentarios..." rows="4"></textarea>
                </div>

                <!-- Fila 6: Botones inferiores -->
                <div class="botones-formulario">
                    <button type="reset" class="btn-borrar">Borrar</button>
                    <button type="submit" class="btn-enviar">Enviar</button>
                </div>
            </form>
        </div>

    </section>

</body>
</html>
